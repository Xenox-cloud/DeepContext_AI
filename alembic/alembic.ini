# Alembic configuration

script_location = alembic
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/nlp_platform

# Logging configuration
[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(asctime)s %(levelname)-8s %(name)-12s %(message)s
datefmt = %H:%M:%S

# Other Alembic configuration
include_opaque = True
